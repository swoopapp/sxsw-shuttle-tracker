<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SXSW Shuttle Tracker</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; overflow: hidden; }
  #map { width: 100%; height: 100vh; }

  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(15, 15, 15, 0.92); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 16px; width: 320px; max-height: calc(100vh - 24px);
    overflow-y: auto; transition: transform 0.3s ease;
  }
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  @media (max-width: 640px) {
    #panel {
      top: auto; left: 0; right: 0; bottom: 0;
      width: 100%; max-height: 75vh;
      border-radius: 16px 16px 0 0;
      padding: 0 16px 16px;
      transform: translateY(calc(100% - 64px));
      will-change: transform;
    }
    #panel.expanded { transform: translateY(0); }
    #panel.expanded .drawer-handle-bar { margin-bottom: 4px; }
    .drawer-handle {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0 6px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .drawer-handle-bar {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.25); margin-bottom: 8px;
    }
    .drawer-peek {
      display: flex; align-items: center; justify-content: space-between; width: 100%;
    }
    .drawer-peek-title { font-size: 14px; font-weight: 700; color: #fff; }
    .drawer-peek-status { font-size: 11px; color: #888; }
  }
  @media (min-width: 641px) { .drawer-handle { display: none; } }

  #panel h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #fff; }
  #panel .subtitle { font-size: 11px; color: #888; margin-bottom: 12px; }

  .status-bar {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #888; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .status-dot.polling { animation: pulse 1s ease-in-out; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .route-badge {
    display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; margin-bottom: 12px;
  }
  .route-badge.day { background: rgba(249,115,22,0.15); color: #f97316; }
  .route-badge.night { background: rgba(34,197,94,0.15); color: #22c55e; }

  .panel-body { }
  @media (max-width: 640px) {
    .panel-body { display: none; }
    #panel.expanded .panel-body { display: block; }
  }

  .tab-bar {
    display: flex; gap: 0; margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tab-btn {
    flex: 1; padding: 8px 0; background: none; border: none;
    color: #666; font-size: 11px; font-weight: 600; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn:hover { color: #aaa; }
  .tab-btn.active { color: #a5b4fc; border-bottom-color: #6366f1; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .shuttle-list { display: flex; flex-direction: column; gap: 4px; }
  .shuttle-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    transition: background 0.15s;
  }
  .shuttle-item:hover { background: rgba(255,255,255,0.06); }
  .shuttle-item.inactive { opacity: 0.35; }
  .shuttle-badge {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .shuttle-info { flex: 1; min-width: 0; }
  .shuttle-name { font-size: 13px; font-weight: 600; color: #ddd; }
  .shuttle-meta { font-size: 10px; color: #666; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .shuttle-eta { font-size: 10px; color: #f97316; margin-top: 1px; }
  .shuttle-active-tag {
    font-size: 9px; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; background: rgba(34,197,94,0.15); color: #22c55e; flex-shrink: 0;
  }
  .shuttle-inactive-tag {
    font-size: 9px; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; background: rgba(255,255,255,0.05); color: #555; flex-shrink: 0;
  }

  /* Stop arrivals board */
  .stop-card {
    margin-bottom: 8px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden; transition: all 0.15s;
  }
  .stop-card:hover { border-color: rgba(255,255,255,0.12); }
  .stop-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; cursor: pointer;
    background: rgba(255,255,255,0.02);
  }
  .stop-card-number {
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    background: rgba(99,102,241,0.3); border: 1px solid rgba(99,102,241,0.5);
  }
  .stop-card-number.night-only {
    background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); color: #86efac;
  }
  .stop-card-info { flex: 1; min-width: 0; }
  .stop-card-name { font-size: 13px; font-weight: 600; color: #ddd; }
  .stop-card-summary { font-size: 10px; color: #666; margin-top: 1px; }
  .stop-card-body { padding: 0 12px 10px; }

  .arrival-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .arrival-row:first-child { border-top: none; }
  .arrival-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .arrival-info { flex: 1; font-size: 11px; color: #ccc; }
  .arrival-eta {
    font-size: 10px; font-weight: 600; flex-shrink: 0; padding: 2px 6px;
    border-radius: 4px;
  }
  .arrival-eta.here { background: rgba(34,197,94,0.15); color: #22c55e; }
  .arrival-eta.soon { background: rgba(249,115,22,0.15); color: #f97316; }
  .arrival-eta.later { background: rgba(255,255,255,0.05); color: #888; }
  .no-arrivals { font-size: 11px; color: #555; padding: 8px 0; }

  .controls {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; gap: 6px;
  }
  .controls button {
    flex: 1; padding: 7px 0; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; background: rgba(255,255,255,0.04);
    color: #aaa; font-size: 11px; font-weight: 500; cursor: pointer;
    transition: all 0.15s;
  }
  .controls button:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .controls button.active { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.4); color: #a5b4fc; }

  .mapboxgl-popup-content {
    background: rgba(15,15,15,0.95) !important; backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 10px !important;
    padding: 12px 14px !important; color: #e0e0e0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  }
  .mapboxgl-popup-tip { border-top-color: rgba(15,15,15,0.95) !important; }
  .mapboxgl-popup-close-button { color: #888 !important; font-size: 16px !important; }
  .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .popup-row { font-size: 11px; color: #999; margin-bottom: 2px; }
  .popup-row span { color: #ddd; }

  .legend {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Trip planner floating button */
  #tripBtn {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 10; padding: 12px 24px; border: none; border-radius: 50px;
    background: #6366f1; color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; gap: 8px;
  }
  #tripBtn:hover { background: #4f46e5; transform: translateX(-50%) scale(1.03); }
  @media (max-width: 640px) { #tripBtn { bottom: 76px; } }

  /* Trip planner overlay */
  #tripOverlay {
    position: absolute; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    display: none; align-items: flex-end; justify-content: center;
  }
  #tripOverlay.open { display: flex; }
  #tripCard {
    background: rgba(15,15,15,0.96); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 420px; max-height: 85vh; overflow-y: auto;
    padding: 20px; color: #e0e0e0;
  }
  @media (min-width: 641px) {
    #tripOverlay { align-items: center; }
    #tripCard { border-radius: 16px; max-height: 80vh; }
  }
  #tripCard::-webkit-scrollbar { width: 4px; }
  #tripCard::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .trip-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .trip-header h2 { font-size: 18px; font-weight: 700; color: #fff; }
  .trip-close {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.08); color: #aaa; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .trip-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

  .trip-loading {
    text-align: center; padding: 32px 0; color: #888; font-size: 13px;
  }
  .trip-loading .spinner {
    width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1; border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .trip-nearest {
    background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
    border-radius: 12px; padding: 14px; margin-bottom: 16px;
  }
  .trip-nearest-label { font-size: 10px; font-weight: 600; color: #6366f1; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .trip-nearest-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .trip-nearest-detail { font-size: 12px; color: #999; }
  .trip-nearest-eta { font-size: 11px; color: #f97316; margin-top: 4px; }

  .trip-dest-label { font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 8px; }
  .trip-dest-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .trip-dest-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06); transition: all 0.15s;
  }
  .trip-dest-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
  .trip-dest-item.selected { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); }
  .trip-dest-num {
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #a5b4fc; flex-shrink: 0;
    background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3);
  }
  .trip-dest-num.night-stop { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #86efac; }
  .trip-dest-info { flex: 1; min-width: 0; }
  .trip-dest-name { font-size: 13px; font-weight: 600; color: #ddd; }
  .trip-dest-venues { font-size: 10px; color: #777; margin-top: 1px; }

  .trip-summary {
    background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
    border-radius: 12px; padding: 16px; margin-top: 16px;
  }
  .trip-summary-title { font-size: 12px; font-weight: 700; color: #22c55e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .trip-step {
    display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
    position: relative;
  }
  .trip-step-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .trip-step-icon.walk { background: rgba(99,102,241,0.2); }
  .trip-step-icon.wait { background: rgba(249,115,22,0.2); }
  .trip-step-icon.ride { background: rgba(34,197,94,0.2); }
  .trip-step-icon.arrive { background: rgba(168,85,247,0.2); }
  .trip-step-text { flex: 1; }
  .trip-step-main { font-size: 13px; font-weight: 600; color: #ddd; }
  .trip-step-sub { font-size: 10px; color: #888; margin-top: 1px; }
  .trip-total {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 14px; font-weight: 700; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  .trip-total-time { color: #22c55e; }

  .trip-go-btn {
    width: 100%; margin-top: 16px; padding: 14px; border: none;
    border-radius: 12px; background: #6366f1; color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background 0.15s;
  }
  .trip-go-btn:hover { background: #4f46e5; }

  .trip-error { text-align: center; padding: 20px 0; color: #f87171; font-size: 13px; }
</style>
</head>
<body>

<div id="panel">
  <div class="drawer-handle" id="drawerHandle">
    <div class="drawer-handle-bar"></div>
    <div class="drawer-peek">
      <span class="drawer-peek-title">SXSW Shuttles</span>
      <span class="drawer-peek-status" id="drawerStatus">Loading...</span>
    </div>
  </div>

  <div class="panel-body">
    <h1>SXSW Shuttle Tracker</h1>
    <div class="subtitle">Live GPS tracking - Austin, TX - March 2026</div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <div class="route-badge day" id="routeBadge">Orange Route (Daytime)</div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('shuttles')">Shuttles</button>
      <button class="tab-btn" onclick="switchTab('ada')">ADA</button>
      <button class="tab-btn" onclick="switchTab('stops')">Stops</button>
    </div>

    <div class="tab-content active" id="tab-shuttles">
      <div class="shuttle-list" id="shuttleList"></div>
      <div class="controls">
        <button id="btnAll" onclick="filterShuttles('all')">All</button>
        <button id="btnActive" class="active" onclick="filterShuttles('active')">Active</button>
        <button id="btnFit" onclick="fitAll()">Fit Map</button>
      </div>
    </div>

    <div class="tab-content" id="tab-ada">
      <div style="font-size:11px;color:#888;margin-bottom:10px">ADA accessible shuttles</div>
      <div class="shuttle-list" id="adaList"></div>
    </div>

    <div class="tab-content" id="tab-stops">
      <div id="stopArrivals"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#a5b4fc; border: 1.5px solid #6366f1"></div> Stop</div>
      <div class="legend-item"><div class="legend-dot" style="background:#86efac; border: 1.5px solid #22c55e"></div> Night only</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Active bus</div>
    </div>
  </div>
</div>

<button id="tripBtn" onclick="startTripPlanner()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7 11.5 7.3 11.8a1 1 0 0 0 1.4 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/></svg>
  Find My Shuttle
</button>

<div id="tripOverlay">
  <div id="tripCard">
    <div class="trip-header">
      <h2>Plan Your Ride</h2>
      <button class="trip-close" onclick="closeTripPlanner()">&times;</button>
    </div>
    <div id="tripContent">
      <div class="trip-loading">
        <div class="spinner"></div>
        Finding your location...
      </div>
    </div>
  </div>
</div>

<div id="map"></div>

const NIGHT_ROUTE = ['congress','paramount','downright','shangrila','hotelvegas','violetcrown','palmer','zach','alamo','rollins','rivian','continental'];


// ── ETA between consecutive stops [min, max] ──
const SEGMENT_ETA = {};
function initETAs() {
  const allPairs = new Set();
  [DAY_ROUTE, NIGHT_ROUTE].forEach(route => {
    for (let i = 0; i < route.length; i++) {
      allPairs.add(`${route[i]}>${route[(i + 1) % route.length]}`);
    }
  });
  allPairs.forEach(k => { SEGMENT_ETA[k] = [15, 30]; });
}
initETAs();

// ── Time-aware route ──
function isNightMode() {
  const h = parseInt(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', hour12: false }));
  return h >= 19;
}
function getActiveRoute() { return isNightMode() ? NIGHT_ROUTE : DAY_ROUTE; }
function getActiveStops() {
  return getActiveRoute().map((key, i) => ({ key, num: i + 1, ...ALL_STOPS[key] }));
}

// ── Shuttle tracking state ──
const lastNearestKey = {};
const shuttleDirection = {};
const dwellTracker = {}; // shuttleId -> { stopKey, count }
const shuttleStatus = {}; // shuttleId -> { status: 'at_stop'|'en_route', stopKey, nearestIdx, nearestKey, nearestDist }
const prevPositions = {}; // shuttleId -> { lat, lng, time }
const speedHistory = {}; // shuttleId -> [speed1, speed2, ...] in km/h
const observedSegments = {}; // "stopA>stopB" -> [minutes, ...] observed travel times
const segmentEntry = {}; // shuttleId -> { fromKey, enteredAt } for recording segment times

function updateShuttleTracking(shuttleId, lat, lng) {
  const route = getActiveRoute();
  const stops = getActiveStops();
  const now = Date.now();

  // ── Calculate instant speed from previous position ──
  const prev = prevPositions[shuttleId];
  if (prev) {
    const dtHours = (now - prev.time) / 3600000;
    const dist = haversine(prev.lat, prev.lng, lat, lng);
    if (dtHours > 0) {
      const instantSpeed = dist / dtHours; // km/h
      if (instantSpeed < 120) { // filter GPS glitches
        if (!speedHistory[shuttleId]) speedHistory[shuttleId] = [];
        speedHistory[shuttleId].push(instantSpeed);
        if (speedHistory[shuttleId].length > SPEED_HISTORY_SIZE) speedHistory[shuttleId].shift();
      }
    }
  }
  prevPositions[shuttleId] = { lat, lng, time: now };

  // ── Find nearest stop ──
  let minDist = Infinity, nearestIdx = 0;
  stops.forEach((s, i) => {
    const d = haversine(lat, lng, s.lat, s.lng);
    if (d < minDist) { minDist = d; nearestIdx = i; }
  });
  const nearestKey = route[nearestIdx];

  // ── Dwell detection ──
  if (!dwellTracker[shuttleId]) dwellTracker[shuttleId] = { stopKey: null, count: 0 };
  const dwell = dwellTracker[shuttleId];
  if (minDist <= DWELL_RADIUS_KM && nearestKey === dwell.stopKey) {
    dwell.count++;
  } else if (minDist <= DWELL_RADIUS_KM) {
    dwell.stopKey = nearestKey;
    dwell.count = 1;
  } else {
    dwell.stopKey = null;
    dwell.count = 0;
  }
  const isAtStop = dwell.count >= DWELL_POLLS && minDist <= DWELL_RADIUS_KM;

  // ── Record observed segment travel times ──
  const prevKey = lastNearestKey[shuttleId];
  if (!segmentEntry[shuttleId]) {
    segmentEntry[shuttleId] = { fromKey: nearestKey, enteredAt: now };
  }
  if (prevKey && prevKey !== nearestKey) {
    const entry = segmentEntry[shuttleId];
    if (entry && entry.fromKey === prevKey) {
      const segKey = `${prevKey}>${nearestKey}`;
      const travelMin = (now - entry.enteredAt) / 60000;
      if (travelMin > 0.5 && travelMin < 60) { // reasonable range
        if (!observedSegments[segKey]) observedSegments[segKey] = [];
        observedSegments[segKey].push(travelMin);
        if (observedSegments[segKey].length > 10) observedSegments[segKey].shift();
      }
    }
    segmentEntry[shuttleId] = { fromKey: nearestKey, enteredAt: now };
  }

  // ── Direction detection ──
  if (prevKey && prevKey !== nearestKey) {
    const prevIdx = route.indexOf(prevKey);
    const forwardIdx = (prevIdx + 1) % route.length;
    if (nearestIdx === forwardIdx) {
      const nextIdx = (nearestIdx + 1) % route.length;
      shuttleDirection[shuttleId] = { nextKey: route[nextIdx], fromIdx: nearestIdx };
    }
  }
  if (!shuttleDirection[shuttleId]) {
    const nextIdx = (nearestIdx + 1) % route.length;
    shuttleDirection[shuttleId] = { nextKey: route[nextIdx], fromIdx: nearestIdx };
  }
  lastNearestKey[shuttleId] = nearestKey;

  // ── Calculate ETA ──
  const dir = shuttleDirection[shuttleId];
  const nextStop = ALL_STOPS[dir.nextKey];
  const distToNextRoad = haversine(lat, lng, nextStop.lat, nextStop.lng) * ROAD_FACTOR;

  // Rolling average speed (exclude near-zero readings = stopped at lights etc)
  const speeds = (speedHistory[shuttleId] || []).filter(s => s >= MIN_SPEED_KMH);
  const avgSpeed = speeds.length >= 2 ? speeds.reduce((a, b) => a + b, 0) / speeds.length : 0;

  let etaLive = null; // single value in minutes when speed data available
  let etaMin, etaMax; // range fallback

  if (avgSpeed >= MIN_SPEED_KMH) {
    // Speed-based ETA
    etaLive = Math.max(1, Math.round((distToNextRoad / avgSpeed) * 60));
    etaMin = etaLive;
    etaMax = etaLive;
  } else {
    // Fallback: observed segment average, then hardcoded
    const seg = getSegmentETA(nearestKey, dir.nextKey);
    const fromStop = stops[nearestIdx];
    const totalSegDist = haversine(fromStop.lat, fromStop.lng, nextStop.lat, nextStop.lng);
    const ratio = totalSegDist > 0 ? Math.min(haversine(lat, lng, nextStop.lat, nextStop.lng) / totalSegDist, 1) : 1;
    etaMin = Math.max(1, Math.round(seg[0] * ratio));
    etaMax = Math.max(2, Math.round(seg[1] * ratio));
  }

  shuttleStatus[shuttleId] = {
    status: isAtStop ? 'at_stop' : 'en_route',
    atStopKey: isAtStop ? nearestKey : null,
    nearestIdx, nearestKey, nearestDist: minDist,
    nextKey: dir.nextKey, nextStop,
    etaLive, etaMin, etaMax,
    avgSpeed: Math.round(avgSpeed),
    nearestStop: stops[nearestIdx],
  };

  return shuttleStatus[shuttleId];
}

// ── Get best available ETA for a segment ──
function getSegmentETA(fromKey, toKey) {
  const segKey = `${fromKey}>${toKey}`;
  const observed = observedSegments[segKey];
  if (observed && observed.length >= 2) {
    const avg = Math.round(observed.reduce((a, b) => a + b, 0) / observed.length);
    return [avg, avg]; // observed data is a single value, not a range
  }
  return SEGMENT_ETA[segKey] || [15, 30];
}

// ── Get arrivals for a stop ──
function getStopArrivals(stopKey) {
  const route = getActiveRoute();
  const stopIdx = route.indexOf(stopKey);
  if (stopIdx === -1) return { here: [], arriving: [], coming: [] };

  const here = [];
  const arriving = [];
  const coming = [];

  SHUTTLES.forEach((s, i) => {
    if (s.ada) return; // ADA shuttles run their own routes
    const pos = positions[s.id];
    if (!pos) return;
    const isActive = (Date.now() - new Date(pos.timestamp).getTime()) < ACTIVE_THRESHOLD_MS;
    if (!isActive) return;

    const st = shuttleStatus[s.id];
    if (!st) return;

    const shuttleInfo = { shuttle: s, idx: i, status: st };

    // At this stop
    if (st.status === 'at_stop' && st.atStopKey === stopKey) {
      here.push(shuttleInfo);
      return;
    }

    // Next stop is this stop (arriving)
    if (st.nextKey === stopKey) {
      arriving.push({ ...shuttleInfo, etaMin: st.etaMin, etaMax: st.etaMax, etaLive: st.etaLive !== null, stopsAway: 1 });
      return;
    }

    // Walk forward from shuttle's nearest stop to see how many stops until target
    const shuttleIdx = st.nearestIdx;
    for (let steps = 2; steps <= 3; steps++) {
      const checkIdx = (shuttleIdx + steps) % route.length;
      if (route[checkIdx] === stopKey) {
        // First segment uses shuttle's current ETA (speed-based if available)
        let totalMin = st.etaMin, totalMax = st.etaMax;
        // Add remaining segments using best available data
        for (let j = 1; j < steps; j++) {
          const fromIdx = (shuttleIdx + j) % route.length;
          const toIdx = (shuttleIdx + j + 1) % route.length;
          const seg = getSegmentETA(route[fromIdx], route[toIdx]);
          totalMin += seg[0];
          totalMax += seg[1];
        }
        const hasLive = st.etaLive !== null;
        coming.push({ ...shuttleInfo, etaMin: totalMin, etaMax: totalMax, etaLive: hasLive, stopsAway: steps });
        return;
      }
    }
  });

  return { here, arriving, coming };
}

  const arrivingHtml = arrivals.arriving.map(a =>

  ).join('');
  const comingHtml = arrivals.coming.map(a =>
    `<div class="popup-row">${a.shuttle.name} - ${a.etaLive ? `~${a.etaMin} min` : `~${a.etaMin}-${a.etaMax} min`} (${a.stopsAway} stops away)</div>`
  ).join('');

  new mapboxgl.Popup({ offset: 16, closeButton: true })
    .setLngLat([stop.lng, stop.lat])
    .setHTML(`
      <div class="popup-title" style="color:${stop.nightOnly ? '#86efac' : '#a5b4fc'}">Stop ${stop.num}: ${stop.name}</div>
      ${stop.nightOnly ? '<div class="popup-row" style="color:#22c55e">Available after 7PM CST</div>' : ''}

}

function calcBearing(lat1, lng1, lat2, lng2) {
  const toRad = d => d * Math.PI / 180;
  const dLng = toRad(lng2 - lng1);
  const y = Math.sin(dLng) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  return `${hr}h ${min % 60}m ago`;
}

function buildTopics() {
  return SHUTTLES.map(s => `${SOLUTION_ID}/+/+/+/+/${s.id}/position`);
}

async function poll() {
  const dot = document.getElementById('statusDot');
  dot.classList.add('polling');
  renderStops();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topics: buildTopics() })
    });
    const data = await res.json();

    data.forEach(item => {
      const coords = item.properties?.coordinates;
      if (!coords) return;
      const prev = positions[item.id];
      positions[item.id] = {
        lat: coords.latitude, lng: coords.longitude,
        timestamp: item.timestamp, originSourceId: item.originSourceId
      };
      if (shuttleMarkers[item.id]) {
        const sm = shuttleMarkers[item.id];
        sm.marker.setLngLat([coords.longitude, coords.latitude]);
        // Calculate bearing from previous position
        if (prev && (prev.lat !== coords.latitude || prev.lng !== coords.longitude)) {
          const bearing = calcBearing(prev.lat, prev.lng, coords.latitude, coords.longitude);
          shuttleBearings[item.id] = bearing;
          sm.marker.setRotation(bearing);
        } else if (shuttleBearings[item.id] !== undefined) {
          sm.marker.setRotation(shuttleBearings[item.id]);
        }
      }
      // Update tracking for non-ADA shuttles (ADA run their own routes)
      const shuttle = SHUTTLES.find(s => s.id === item.id);
      const isActive = (Date.now() - new Date(item.timestamp).getTime()) < ACTIVE_THRESHOLD_MS;
      if (isActive && shuttle && !shuttle.ada) updateShuttleTracking(item.id, coords.latitude, coords.longitude);
    });

    updatePanel();
    updateAdaPanel();
    updateStopArrivals();

    const activeCount = data.filter(d => (Date.now() - new Date(d.timestamp).getTime()) < ACTIVE_THRESHOLD_MS).length;
    document.getElementById('statusText').textContent = `${activeCount} active / ${data.length} total - ${new Date().toLocaleTimeString()}`;
    document.getElementById('drawerStatus').textContent = `${activeCount} live`;
  } catch (err) {
    document.getElementById('statusText').textContent = `Error: ${err.message}`;
    document.getElementById('drawerStatus').textContent = 'Error';
  }
  setTimeout(() => dot.classList.remove('polling'), 500);
}

function updatePanel() {
  const list = document.getElementById('shuttleList');

  SHUTTLES.forEach((s, i) => {
    const pos = positions[s.id];
    const isActive = pos && (Date.now() - new Date(pos.timestamp).getTime()) < ACTIVE_THRESHOLD_MS;

    if (s.ada) {
      shuttleMarkers[s.id].el.style.display = isActive ? 'flex' : 'none';
      return;
    }

    if (currentFilter === 'active' && !isActive) {
      shuttleMarkers[s.id].el.style.display = 'none';
      return;
    } else {
      shuttleMarkers[s.id].el.style.display = 'flex';
    }

    const st = shuttleStatus[s.id];
    const div = document.createElement('div');
    div.className = `shuttle-item${isActive ? '' : ' inactive'}`;
    div.onclick = () => {
      if (pos) {
        map.flyTo({ center: [pos.lng, pos.lat], zoom: 16, duration: 800 });
        showShuttlePopup(s, i);
        if (window.innerWidth <= 640) { drawerExpanded = false; panel.classList.remove('expanded'); }
      }
    };

    let statusLine = 'No data';
    if (st) {
      if (st.status === 'at_stop') statusLine = `At ${ALL_STOPS[st.atStopKey].name}`;
      else statusLine = `Near ${st.nearestStop.name}`;
    }

    div.innerHTML = `
      <div class="shuttle-badge" style="background:${SHUTTLE_COLORS[i]}">${s.num}</div>
      <div class="shuttle-info">
        <div class="shuttle-name">${s.name}</div>
        <div class="shuttle-meta">${statusLine}${pos ? ' - ' + timeAgo(pos.timestamp) : ''}</div>
        ${st && isActive && st.status !== 'at_stop' ? `<div class="shuttle-eta">Next: ${st.nextStop.name} (${st.etaLive !== null ? `~${st.etaLive} min` : `${st.etaMin}-${st.etaMax} min`})</div>` : ''}
      </div>
      ${isActive
        ? (st && st.status === 'at_stop'
          ? '<span class="shuttle-active-tag">AT STOP</span>'
          : '<span class="shuttle-active-tag">LIVE</span>')
        : '<span class="shuttle-inactive-tag">IDLE</span>'}
    `;
    list.appendChild(div);
  });
}

function fitAll() {
  const bounds = new mapboxgl.LngLatBounds();
  getActiveStops().forEach(s => bounds.extend([s.lng, s.lat]));
  Object.values(positions).forEach(p => bounds.extend([p.lng, p.lat]));
  map.fitBounds(bounds, { padding: 80, duration: 800 });
}

// ── Trip planner ──
let tripUserMarker = null;
let tripWalkingRouteAdded = false;
let tripWatchId = null;

function startTripPlanner() {
  const overlay = document.getElementById('tripOverlay');
  const content = document.getElementById('tripContent');
  overlay.classList.add('open');
  content.innerHTML = '<div class="trip-loading"><div class="spinner"></div>Finding your location...</div>';

  if (!navigator.geolocation) {
    content.innerHTML = '<div class="trip-error">Geolocation is not supported by your browser.</div>';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => onLocationFound(pos.coords.latitude, pos.coords.longitude),
    err => {
      content.innerHTML = `<div class="trip-error">Could not get your location.<br><span style="font-size:11px;color:#888">${err.message}</span></div>`;
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function closeTripPlanner() {
  document.getElementById('tripOverlay').classList.remove('open');
  // Clean up walking route
  if (map.getSource('walk-route')) {
    map.removeLayer('walk-route-line');
    map.removeSource('walk-route');
  }
  if (tripUserMarker) { tripUserMarker.remove(); tripUserMarker = null; }
  if (tripWatchId) { navigator.geolocation.clearWatch(tripWatchId); tripWatchId = null; }
}

function onLocationFound(userLat, userLng) {
  const stops = getActiveStops();
  const route = getActiveRoute();

  // Find nearest stop
  let minDist = Infinity, nearestStop = null;
  stops.forEach(s => {
    const d = haversine(userLat, userLng, s.lat, s.lng);
    if (d < minDist) { minDist = d; nearestStop = s; }
  });

  // Walking estimate: ~5 km/h average walking speed
  const walkKm = minDist * ROAD_FACTOR;
  const walkMin = Math.max(1, Math.round((walkKm / 5) * 60));

  // Place user marker
  if (tripUserMarker) tripUserMarker.remove();
  const userEl = document.createElement('div');
  userEl.style.cssText = 'width:16px;height:16px;border-radius:50%;background:#6366f1;border:3px solid #fff;box-shadow:0 0 12px rgba(99,102,241,0.6);';
  tripUserMarker = new mapboxgl.Marker({ element: userEl, anchor: 'center' })
    .setLngLat([userLng, userLat]).addTo(map);

  // Get shuttle arrivals at nearest stop
  const arrivals = getStopArrivals(nearestStop.key);
  let nextShuttleText = 'No shuttles nearby right now';
  if (arrivals.here.length > 0) nextShuttleText = `${arrivals.here[0].shuttle.name} is here now!`;
  else if (arrivals.arriving.length > 0) {
    const a = arrivals.arriving[0];
    nextShuttleText = `${a.shuttle.name} arriving in ${a.etaLive ? `~${a.etaMin}` : `${a.etaMin}-${a.etaMax}`} min`;
  } else if (arrivals.coming.length > 0) {
    const a = arrivals.coming[0];
    nextShuttleText = `${a.shuttle.name} in ~${a.etaMin}-${a.etaMax} min (${a.stopsAway} stops away)`;
  }

  // Build destination list (all stops except nearest)
  const destStops = stops.filter(s => s.key !== nearestStop.key);
  const nearestIdx = route.indexOf(nearestStop.key);

  const content = document.getElementById('tripContent');
  content.innerHTML = `
    <div class="trip-nearest">
      <div class="trip-nearest-label">Nearest stop to you</div>
      <div class="trip-nearest-name">Stop ${nearestStop.num}: ${nearestStop.name}</div>
      <div class="trip-nearest-detail">${walkMin} min walk (${(walkKm * 1000).toFixed(0)}m) &middot; ${STOP_VENUES[nearestStop.key]}</div>
      <div class="trip-nearest-eta">${nextShuttleText}</div>
    </div>
    <div class="trip-dest-label">Where do you want to go?</div>
    <div class="trip-dest-list" id="tripDestList">
      ${destStops.map(s => `
        <div class="trip-dest-item" data-key="${s.key}" onclick="selectDestination('${s.key}', ${userLat}, ${userLng}, '${nearestStop.key}')">
          <div class="trip-dest-num${s.nightOnly ? ' night-stop' : ''}">${s.num}</div>
          <div class="trip-dest-info">
            <div class="trip-dest-name">${s.name}</div>
            <div class="trip-dest-venues">${STOP_VENUES[s.key]}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div id="tripSummary"></div>
  `;

  // Fetch walking route to nearest stop
  fetchWalkingRoute(userLat, userLng, nearestStop.lat, nearestStop.lng);

  // Zoom to show user + nearest stop
  const bounds = new mapboxgl.LngLatBounds();
  bounds.extend([userLng, userLat]);
  bounds.extend([nearestStop.lng, nearestStop.lat]);
  map.fitBounds(bounds, { padding: 100, duration: 800 });
}

async function fetchWalkingRoute(fromLat, fromLng, toLat, toLng) {
  const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${fromLng},${fromLat};${toLng},${toLat}?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.routes || !data.routes[0]) return;

    const geojson = { type: 'Feature', geometry: data.routes[0].geometry };

    if (map.getSource('walk-route')) {
      map.getSource('walk-route').setData(geojson);
    } else {
      map.addSource('walk-route', { type: 'geojson', data: geojson });
      map.addLayer({
        id: 'walk-route-line', type: 'line', source: 'walk-route',
        paint: {
          'line-color': '#6366f1', 'line-width': 4,
          'line-opacity': 0.8, 'line-dasharray': [1, 1.5]
        }
      });
    }
  } catch (e) {
    console.error('Walking route fetch failed:', e);
  }
}

function selectDestination(destKey, userLat, userLng, boardKey) {
  // Highlight selected
  document.querySelectorAll('.trip-dest-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.key === destKey);
  });

  const route = getActiveRoute();
  const stops = getActiveStops();
  const boardIdx = route.indexOf(boardKey);
  const destIdx = route.indexOf(destKey);
  const boardStop = stops.find(s => s.key === boardKey);
  const destStop = stops.find(s => s.key === destKey);

  // Count stops in route direction
  let stopsCount = 0;
  let idx = boardIdx;
  while (idx !== destIdx) {
    idx = (idx + 1) % route.length;
    stopsCount++;
  }

  // Walk time
  const walkKm = haversine(userLat, userLng, boardStop.lat, boardStop.lng) * ROAD_FACTOR;
  const walkMin = Math.max(1, Math.round((walkKm / 5) * 60));

  // Shuttle wait time (from arrivals data)
  const arrivals = getStopArrivals(boardKey);
  let waitMin = 0;
  let waitText = 'Shuttle at stop now';
  if (arrivals.here.length > 0) {
    waitMin = 0;
  } else if (arrivals.arriving.length > 0) {
    const a = arrivals.arriving[0];
    waitMin = a.etaMin;
    waitText = `~${a.etaMin} min wait`;
  } else if (arrivals.coming.length > 0) {
    const a = arrivals.coming[0];
    waitMin = a.etaMin;
    waitText = `~${a.etaMin} min wait`;
  } else {
    waitMin = 15;
    waitText = '~15 min (estimated)';
  }

  // Ride time estimate: sum segment ETAs from board to dest
  let rideMin = 0;
  for (let i = 0; i < stopsCount; i++) {
    const fromIdx = (boardIdx + i) % route.length;
    const toIdx = (boardIdx + i + 1) % route.length;
    const seg = getSegmentETA(route[fromIdx], route[toIdx]);
    rideMin += Math.round((seg[0] + seg[1]) / 2);
  }
  rideMin = Math.max(2, rideMin);

  const totalMin = walkMin + waitMin + rideMin;

  const summaryEl = document.getElementById('tripSummary');
  summaryEl.innerHTML = `
    <div class="trip-summary">
      <div class="trip-summary-title">Your trip</div>
      <div class="trip-step">
        <div class="trip-step-icon walk">&#128694;</div>
        <div class="trip-step-text">
          <div class="trip-step-main">Walk to Stop ${boardStop.num}</div>
          <div class="trip-step-sub">${boardStop.name} &middot; ${walkMin} min (${(walkKm * 1000).toFixed(0)}m)</div>
        </div>
      </div>
      <div class="trip-step">
        <div class="trip-step-icon wait">&#9201;</div>
        <div class="trip-step-text">
          <div class="trip-step-main">Wait for shuttle</div>
          <div class="trip-step-sub">${waitText}</div>
        </div>
      </div>
      <div class="trip-step">
        <div class="trip-step-icon ride">&#128652;</div>
        <div class="trip-step-text">
          <div class="trip-step-main">Ride ${stopsCount} stop${stopsCount > 1 ? 's' : ''}</div>
          <div class="trip-step-sub">${boardStop.name} &#8594; ${destStop.name} &middot; ~${rideMin} min</div>
        </div>
      </div>
      <div class="trip-step">
        <div class="trip-step-icon arrive">&#127919;</div>
        <div class="trip-step-text">
          <div class="trip-step-main">Arrive at ${destStop.name}</div>
          <div class="trip-step-sub">${STOP_VENUES[destKey]}</div>
        </div>
      </div>
      <div class="trip-total">
        <span>Estimated total</span>
        <span class="trip-total-time">~${totalMin} min</span>
      </div>
    </div>
    <button class="trip-go-btn" onclick="startWalking()">Start Walking</button>
  `;

  // Zoom to show full trip
  const bounds = new mapboxgl.LngLatBounds();
  bounds.extend([userLng, userLat]);
  bounds.extend([boardStop.lng, boardStop.lat]);
  bounds.extend([destStop.lng, destStop.lat]);
  map.fitBounds(bounds, { padding: 80, duration: 800 });

  // Smooth scroll summary into view
  summaryEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function startWalking() {
  closeTripPlanner();
  // Keep user dot live with watchPosition
  if (navigator.geolocation) {
    tripWatchId = navigator.geolocation.watchPosition(
      pos => {
        if (tripUserMarker) {
          tripUserMarker.setLngLat([pos.coords.longitude, pos.coords.latitude]);
        } else {
          const el = document.createElement('div');
          el.style.cssText = 'width:16px;height:16px;border-radius:50%;background:#6366f1;border:3px solid #fff;box-shadow:0 0 12px rgba(99,102,241,0.6);';
          tripUserMarker = new mapboxgl.Marker({ element: el, anchor: 'center' })
            .setLngLat([pos.coords.longitude, pos.coords.latitude]).addTo(map);
        }
      },
      () => {},
      { enableHighAccuracy: true }
    );
  }
}

// ── Render route lines from static GeoJSON ──
let lastRouteKey = null;
function renderRouteLines() {
  const night = isNightMode();
  const route = getActiveRoute();
  const routeKey = route.join(',');
  const color = night ? '#16a34a' : '#ea580c';

  if (routeKey !== lastRouteKey) {
    lastRouteKey = routeKey;
    const coords = night ? NIGHT_ROUTE_GEO : DAY_ROUTE_GEO;
    const geojson = {
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: coords }
    };

    if (map.getSource('route')) {
      map.getSource('route').setData(geojson);
    } else {
      map.addSource('route', { type: 'geojson', data: geojson });
      map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route',
        paint: {
          'line-color': color,
          'line-width': 4,
          'line-opacity': 0.6
        }
      });
      map.addLayer({
        id: 'route-arrows',
        type: 'symbol',
        source: 'route',
        layout: {
          'symbol-placement': 'line',
          'symbol-spacing': 80,
          'text-field': '▶',
          'text-size': 14,
          'text-keep-upright': false,
          'text-rotation-alignment': 'map',
          'text-allow-overlap': true,
          'text-ignore-placement': true
        },
        paint: {
          'text-color': color,
          'text-halo-color': '#ffffff',
          'text-halo-width': 1
        }
      });
    }
  }

  if (map.getLayer('route-line')) {
    map.setPaintProperty('route-line', 'line-color', color);
    map.setPaintProperty('route-arrows', 'text-color', color);
  }
}

  renderRouteLines();

  setInterval(poll, POLL_INTERVAL);
});
</script>
