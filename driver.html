<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SXSW Shuttle - Driver Nav</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #111; color: #fff; min-height: 100vh;
    display: flex; flex-direction: column;
    -webkit-user-select: none; user-select: none;
  }

  /* ── Progress bar ── */
  .progress-bar { height: 4px; background: #222; width: 100%; }
  .progress-fill { height: 100%; background: #22c55e; transition: width 0.4s ease; }

  /* ── Top bar ── */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: #161616;
    border-bottom: 1px solid #222;
  }
  .route-label { font-size: 13px; font-weight: 600; color: #888; }
  .route-label span { color: #22c55e; }
  .lap-label { font-size: 12px; color: #555; }

  /* ── Current stop hero ── */
  .hero {
    padding: 24px 20px 20px; text-align: center;
    background: linear-gradient(180deg, #161616 0%, #111 100%);
  }
  .hero-label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .hero-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; border-radius: 50%; margin-bottom: 12px;
    font-size: 22px; font-weight: 800;
    background: rgba(99,102,241,0.25); border: 3px solid rgba(99,102,241,0.6); color: #a5b4fc;
  }
  .hero-name { font-size: 26px; font-weight: 800; color: #fff; line-height: 1.2; }
  .hero-venues { font-size: 13px; color: #666; margin-top: 6px; }

  /* ── Directions card ── */
  .directions {
    flex: 1; overflow-y: auto; padding: 0 16px 120px;
    -webkit-overflow-scrolling: touch;
  }
  .dir-header {
    font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 16px 4px 8px;
  }

  .step {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px; margin-bottom: 8px;
    background: #1a1a1a; border-radius: 12px;
    border: 1px solid #222;
  }
  .step.active-step {
    background: rgba(99,102,241,0.08);
    border-color: rgba(99,102,241,0.3);
  }

  .step-icon {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .step-icon.straight { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .step-icon.left { background: rgba(249,115,22,0.15); color: #f97316; }
  .step-icon.right { background: rgba(168,85,247,0.15); color: #a855f7; }
  .step-icon.merge { background: rgba(20,184,166,0.15); color: #14b8a6; }
  .step-icon.arrive { background: rgba(34,197,94,0.15); color: #22c55e; }
  .step-icon.uturn { background: rgba(239,68,68,0.15); color: #ef4444; }
  .step-icon.slight-left { background: rgba(234,179,8,0.15); color: #eab308; }
  .step-icon.slight-right { background: rgba(236,72,153,0.15); color: #ec4899; }

  .step-body { flex: 1; padding-top: 2px; }
  .step-instruction { font-size: 16px; font-weight: 600; color: #eee; line-height: 1.3; }
  .step-detail { font-size: 12px; color: #666; margin-top: 4px; }

  /* ── Upcoming stops ── */
  .upcoming { padding: 0 16px; }
  .upcoming-header {
    font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 4px 4px 10px;
  }
  .upcoming-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; margin-bottom: 6px;
    background: #1a1a1a; border-radius: 10px; border: 1px solid #222;
  }
  .upcoming-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; background: #222; color: #666;
  }
  .upcoming-name { font-size: 14px; color: #888; }
  .upcoming-done .upcoming-num { background: rgba(34,197,94,0.15); color: #22c55e; }
  .upcoming-done .upcoming-name { color: #444; text-decoration: line-through; }
  .upcoming-current .upcoming-num { background: rgba(99,102,241,0.25); color: #a5b4fc; border: 2px solid rgba(99,102,241,0.5); }
  .upcoming-current .upcoming-name { color: #fff; font-weight: 600; }

  /* ── Bottom actions ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 20px; padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: rgba(17,17,17,0.95); backdrop-filter: blur(12px);
    border-top: 1px solid #222;
    display: flex; gap: 10px;
  }
  .btn-arrived {
    flex: 1; padding: 16px; border: none; border-radius: 12px;
    background: #22c55e; color: #fff;
    font-size: 17px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-arrived:active { background: #16a34a; transform: scale(0.98); }
  .btn-prev {
    width: 52px; border: 1px solid #333; border-radius: 12px;
    background: #1a1a1a; color: #888;
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .btn-prev:active { background: #222; }
  .btn-prev:disabled { opacity: 0.3; }

  /* ── Route list view ── */
  .view-toggle {
    position: absolute; top: 12px; right: 16px;
    padding: 6px 12px; border: 1px solid #333; border-radius: 8px;
    background: #1a1a1a; color: #888; font-size: 11px; font-weight: 600;
    cursor: pointer;
  }
  .view-toggle:active { background: #222; }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="top-bar">
  <div>
    <div class="route-label" id="routeLabel"></div>
  </div>
  <div class="lap-label" id="lapLabel">Lap 1</div>
  <button class="view-toggle" id="viewToggle" onclick="toggleView()">All Stops</button>
</div>

<div id="navView">
  <div class="hero">
    <div class="hero-label" id="heroLabel">Next Stop</div>
    <div class="hero-num" id="heroNum"></div>
    <div class="hero-name" id="heroName"></div>
    <div class="hero-venues" id="heroVenues"></div>
  </div>

  <div class="directions" id="directions"></div>
</div>

<div id="listView" style="display:none; flex:1; overflow-y:auto; padding-bottom:100px;">
  <div class="upcoming" id="allStopsList" style="padding-top:16px;"></div>
</div>

<div class="bottom-bar">
  <button class="btn-prev" id="btnPrev" onclick="prevStop()">‹</button>
  <button class="btn-arrived" id="btnArrived" onclick="nextStop()">Arrived → Next Stop</button>
</div>

<script>
// ── Stop Data ──
const ALL_STOPS = {
  'congress':    { name: '3rd & Congress',              lat: 30.26505, lng: -97.74374 },
  'paramount':   { name: 'Paramount / F&TV Clubhouse',  lat: 30.26992, lng: -97.74190 },
  'downright':   { name: 'Downright / Music Clubhouse', lat: 30.27114, lng: -97.73568 },
  'shangrila':   { name: 'Shangri-La',                  lat: 30.26499, lng: -97.73198, nightOnly: true },
  'hotelvegas':  { name: 'Hotel Vegas / Low Down',      lat: 30.26357, lng: -97.72785, nightOnly: true },
  'violetcrown': { name: 'Violet Crown / ACL Live',     lat: 30.26576, lng: -97.74597 },
  'w3rd':        { name: '101 W 3rd St',                lat: 30.26530, lng: -97.74420 },
  'palmer':      { name: 'Palmer Circle Drive',         lat: 30.26017, lng: -97.75345 },
  'zach':        { name: 'Zach Theatre',                lat: 30.26492, lng: -97.75797 },
  'alamo':       { name: 'Alamo Lamar',                 lat: 30.25628, lng: -97.76151 },
  'rollins':     { name: 'Rollins Theater',             lat: 30.25964, lng: -97.75392 },
  'rivian':      { name: 'Rivian',                      lat: 30.25977, lng: -97.74622 },
  'continental': { name: 'Continental Club / SoCo',     lat: 30.25044, lng: -97.74922 },
};

const STOP_VENUES = {
  'congress':    'Convention Center, Hilton Austin',
  'paramount':   'Paramount Theatre, Driskill Hotel',
  'downright':   'Mohawk, Stubb\'s BBQ',
  'shangrila':   'East 6th bars',
  'hotelvegas':  'Volstead Lounge, East Side',
  'violetcrown': 'ACL Live, Moody Theater',
  'w3rd':        '101 W 3rd St',
  'palmer':      'Palmer Events Center',
  'zach':        'Zach Theatre, Lamar Union',
  'alamo':       'Alamo Drafthouse Lamar',
  'rollins':     'Long Center, Rollins Theatre',
  'rivian':      'Rivian Hub',
  'continental': 'Continental Club, SoCo shops',
};

const DAY_ROUTE = ['congress','paramount','downright','violetcrown','w3rd','palmer','zach','alamo','rollins','rivian','continental'];
const NIGHT_ROUTE = ['congress','paramount','downright','shangrila','hotelvegas','violetcrown','palmer','zach','alamo','rollins','rivian','continental'];

// ── Turn-by-turn directions between consecutive stops ──
// icon: straight, left, right, slight-left, slight-right, merge, uturn, arrive
const DIRECTIONS = {
  // ── DAY ROUTE ──
  'congress>paramount': [
    { icon: 'straight', instruction: 'Head north on Congress Ave', detail: 'Past 4th, 5th, 6th St' },
    { icon: 'arrive', instruction: 'Paramount Theatre is on your right', detail: 'Near 7th & Congress' },
  ],
  'paramount>downright': [
    { icon: 'right', instruction: 'Turn right on E 7th St', detail: 'Head east' },
    { icon: 'straight', instruction: 'Continue on E 7th St', detail: 'Past Trinity, Neches' },
    { icon: 'arrive', instruction: 'Downright / Music Clubhouse on your right', detail: 'Near Red River & 7th' },
  ],
  'downright>violetcrown': [
    { icon: 'left', instruction: 'Head south on Red River St', detail: 'Toward 6th St' },
    { icon: 'right', instruction: 'Turn right on E 5th St', detail: 'Head west' },
    { icon: 'straight', instruction: 'Continue west on 5th St', detail: 'Past Congress Ave' },
    { icon: 'slight-left', instruction: 'Continue onto W 2nd St / Lavaca', detail: '' },
    { icon: 'arrive', instruction: 'Violet Crown / ACL Live on your left', detail: 'Willie Nelson Blvd area' },
  ],
  'violetcrown>w3rd': [
    { icon: 'right', instruction: 'Head east on W 3rd St', detail: 'Short drive' },
    { icon: 'arrive', instruction: '101 W 3rd St on your right', detail: '' },
  ],
  'w3rd>palmer': [
    { icon: 'straight', instruction: 'Continue south toward Cesar Chavez', detail: '' },
    { icon: 'right', instruction: 'Turn right on Barton Springs Rd', detail: 'Head west, cross the bridge' },
    { icon: 'arrive', instruction: 'Palmer Circle Drive on your right', detail: 'Palmer Events Center' },
  ],
  'palmer>zach': [
    { icon: 'straight', instruction: 'Continue west on Barton Springs Rd', detail: '' },
    { icon: 'right', instruction: 'Turn right on S Lamar Blvd', detail: 'Head north' },
    { icon: 'arrive', instruction: 'Zach Theatre on your left', detail: 'Lamar Union area' },
  ],
  'zach>alamo': [
    { icon: 'straight', instruction: 'Continue south on S Lamar Blvd', detail: '' },
    { icon: 'arrive', instruction: 'Alamo Drafthouse Lamar on your left', detail: 'S Lamar Blvd' },
  ],
  'alamo>rollins': [
    { icon: 'left', instruction: 'Head east on Riverside Dr', detail: '' },
    { icon: 'right', instruction: 'Turn right on S 1st St', detail: 'Head south briefly' },
    { icon: 'arrive', instruction: 'Rollins Theater / Long Center on your right', detail: '' },
  ],
  'rollins>rivian': [
    { icon: 'straight', instruction: 'Head east on Barton Springs Rd', detail: '' },
    { icon: 'arrive', instruction: 'Rivian Hub on your right', detail: 'Near S 1st St' },
  ],
  'rivian>continental': [
    { icon: 'right', instruction: 'Head south on S Congress Ave', detail: '' },
    { icon: 'arrive', instruction: 'Continental Club / SoCo on your right', detail: 'S Congress Ave' },
  ],
  'continental>congress': [
    { icon: 'straight', instruction: 'Head north on S Congress Ave', detail: 'Cross the bridge' },
    { icon: 'arrive', instruction: 'Back at 3rd & Congress', detail: 'Loop complete — starting over' },
  ],

  // ── NIGHT ROUTE (extra segments) ──
  'downright>shangrila': [
    { icon: 'left', instruction: 'Head south on Red River St', detail: 'Toward E 6th St' },
    { icon: 'right', instruction: 'Turn right on E 6th St', detail: 'Head east' },
    { icon: 'arrive', instruction: 'Shangri-La on your left', detail: 'East 6th bars district' },
  ],
  'shangrila>hotelvegas': [
    { icon: 'straight', instruction: 'Continue east on E 6th St', detail: '' },
    { icon: 'arrive', instruction: 'Hotel Vegas / Low Down on your right', detail: 'Far east side' },
  ],
  'hotelvegas>violetcrown': [
    { icon: 'left', instruction: 'Head west on E 6th St', detail: 'Back toward downtown' },
    { icon: 'straight', instruction: 'Continue west past Congress', detail: 'Becomes W 5th / 6th area' },
    { icon: 'slight-right', instruction: 'Merge onto W 2nd St / Lavaca', detail: '' },
    { icon: 'arrive', instruction: 'Violet Crown / ACL Live on your left', detail: 'Willie Nelson Blvd area' },
  ],
  // Night route: violetcrown goes straight to palmer (no w3rd stop)
  'violetcrown>palmer': [
    { icon: 'straight', instruction: 'Head south toward Cesar Chavez', detail: '' },
    { icon: 'right', instruction: 'Turn right on Barton Springs Rd', detail: 'Head west, cross the bridge' },
    { icon: 'arrive', instruction: 'Palmer Circle Drive on your right', detail: 'Palmer Events Center' },
  ],
};

// ── State ──
function isNightMode() {
  const h = parseInt(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', hour12: false }));
  return h >= 19;
}
function getActiveRoute() { return isNightMode() ? NIGHT_ROUTE : DAY_ROUTE; }

let currentIdx = parseInt(localStorage.getItem('driverStopIdx') || '0');
let lapCount = parseInt(localStorage.getItem('driverLapCount') || '1');
let showList = false;

function save() {
  localStorage.setItem('driverStopIdx', currentIdx);
  localStorage.setItem('driverLapCount', lapCount);
}

// ── Render ──
function render() {
  const night = isNightMode();
  const route = getActiveRoute();

  // Clamp index
  if (currentIdx >= route.length) { currentIdx = 0; lapCount++; save(); }

  const stopKey = route[currentIdx];
  const stop = ALL_STOPS[stopKey];
  const venues = STOP_VENUES[stopKey] || '';

  // Progress
  document.getElementById('progress').style.width = `${((currentIdx) / route.length) * 100}%`;

  // Top bar
  document.getElementById('routeLabel').innerHTML = night
    ? '🌙 Night Route — <span>Stop ' + (currentIdx + 1) + ' of ' + route.length + '</span>'
    : '☀️ Day Route — <span>Stop ' + (currentIdx + 1) + ' of ' + route.length + '</span>';
  document.getElementById('lapLabel').textContent = 'Lap ' + lapCount;

  // Hero
  document.getElementById('heroLabel').textContent = currentIdx === 0 ? 'Starting At' : 'Next Stop';
  document.getElementById('heroNum').textContent = currentIdx + 1;
  document.getElementById('heroName').textContent = stop.name;
  document.getElementById('heroVenues').textContent = venues;

  // Directions (from previous stop to current)
  const dirEl = document.getElementById('directions');
  if (currentIdx === 0) {
    dirEl.innerHTML = `
      <div class="dir-header">You're at the starting point</div>
      <div class="step active-step">
        <div class="step-icon arrive">📍</div>
        <div class="step-body">
          <div class="step-instruction">Begin your route from here</div>
          <div class="step-detail">Tap "Arrived → Next Stop" when ready to depart</div>
        </div>
      </div>
    `;
  } else {
    const prevKey = route[currentIdx - 1];
    const segKey = prevKey + '>' + stopKey;
    const steps = DIRECTIONS[segKey] || [{ icon: 'straight', instruction: 'Head to ' + stop.name, detail: 'Follow the route' }];

    const icons = {
      'straight': '↑', 'left': '←', 'right': '→',
      'slight-left': '↖', 'slight-right': '↗',
      'merge': '⤵', 'uturn': '↩', 'arrive': '📍'
    };

    let html = `<div class="dir-header">Directions from ${ALL_STOPS[prevKey].name}</div>`;
    steps.forEach((s, i) => {
      const isLast = i === steps.length - 1;
      html += `
        <div class="step ${isLast ? 'active-step' : ''}">
          <div class="step-icon ${s.icon}">${icons[s.icon] || '→'}</div>
          <div class="step-body">
            <div class="step-instruction">${s.instruction}</div>
            ${s.detail ? `<div class="step-detail">${s.detail}</div>` : ''}
          </div>
        </div>
      `;
    });
    dirEl.innerHTML = html;
  }

  // Prev button
  document.getElementById('btnPrev').disabled = (currentIdx === 0 && lapCount <= 1);

  // Arrived button text
  const btn = document.getElementById('btnArrived');
  if (currentIdx === 0) {
    btn.textContent = 'Depart → Head to Stop 2';
  } else if (currentIdx === route.length - 1) {
    btn.textContent = 'Arrived → Complete Lap ' + lapCount;
  } else {
    btn.textContent = 'Arrived → Next Stop';
  }

  // All stops list
  renderList(route);
}

function renderList(route) {
  const el = document.getElementById('allStopsList');
  let html = '<div class="upcoming-header">All Stops</div>';
  route.forEach((key, i) => {
    const stop = ALL_STOPS[key];
    let cls = 'upcoming-item';
    if (i < currentIdx) cls += ' upcoming-done';
    if (i === currentIdx) cls += ' upcoming-current';
    html += `
      <div class="${cls}">
        <div class="upcoming-num">${i < currentIdx ? '✓' : i + 1}</div>
        <div class="upcoming-name">${stop.name}</div>
      </div>
    `;
  });
  el.innerHTML = html;
}

function nextStop() {
  const route = getActiveRoute();
  currentIdx++;
  if (currentIdx >= route.length) {
    currentIdx = 0;
    lapCount++;
  }
  save();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevStop() {
  if (currentIdx > 0) {
    currentIdx--;
  } else if (lapCount > 1) {
    const route = getActiveRoute();
    currentIdx = route.length - 1;
    lapCount--;
  }
  save();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleView() {
  showList = !showList;
  document.getElementById('navView').style.display = showList ? 'none' : '';
  document.getElementById('listView').style.display = showList ? '' : 'none';
  document.getElementById('viewToggle').textContent = showList ? 'Navigation' : 'All Stops';
}

// ── Init ──
render();
setInterval(render, 60000);
</script>
</body>
</html>
