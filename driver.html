<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SXSW Shuttle - Driver Nav</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #111; color: #fff; overflow: hidden;
    height: 100vh; height: 100dvh;
  }

  #map { width: 100%; height: 100%; }

  /* ── Top status bar ── */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top));
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }
  .top-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px; font-weight: 600; color: #ccc;
  }
  .top-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .top-pill .dot.green { background: #22c55e; }
  .top-pill .dot.orange { background: #f97316; }
  .top-pill .dot.red { background: #ef4444; }
  .lap-pill { font-size: 11px; color: #888; padding: 6px 10px; border-radius: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }

  /* ── Bottom panel ── */
  .bottom-panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 0 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 60%, transparent 100%);
    pointer-events: none;
  }
  .bottom-panel > * { pointer-events: auto; }

  .next-stop-card {
    background: rgba(20,20,20,0.95); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 16px; margin-bottom: 12px;
  }
  .next-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .next-name { font-size: 22px; font-weight: 800; color: #fff; margin-top: 4px; line-height: 1.2; }
  .next-venues { font-size: 12px; color: #555; margin-top: 4px; }
  .next-meta {
    display: flex; gap: 16px; margin-top: 10px;
    font-size: 12px; color: #888;
  }
  .next-meta strong { color: #a5b4fc; }

  .stop-progress {
    display: flex; gap: 4px; margin-top: 12px;
  }
  .stop-pip {
    flex: 1; height: 4px; border-radius: 2px; background: #333;
    transition: background 0.3s;
  }
  .stop-pip.done { background: #22c55e; }
  .stop-pip.current { background: #6366f1; }

  .btn-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .btn-arrived {
    flex: 1; padding: 16px; border: none; border-radius: 14px;
    background: #22c55e; color: #fff;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-arrived:active { background: #16a34a; transform: scale(0.98); }
  .btn-arrived.pulse { animation: btnPulse 1s ease-in-out infinite; }
  @keyframes btnPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { box-shadow: 0 0 0 12px rgba(34,197,94,0); } }

  .btn-secondary {
    width: 52px; border: 1px solid #333; border-radius: 14px;
    background: rgba(20,20,20,0.95); backdrop-filter: blur(8px);
    color: #888; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-secondary:active { background: #222; }

  /* ── Approaching alert ── */
  .approach-alert {
    display: none; padding: 10px 16px; margin-bottom: 8px;
    border-radius: 12px; background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    font-size: 13px; font-weight: 600; color: #a5b4fc;
    text-align: center;
  }
  .approach-alert.show { display: block; animation: slideUp 0.3s ease; }
  .approach-alert.arrived { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #22c55e; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Missed stop warning ── */
  .missed-alert {
    display: none; padding: 10px 16px; margin-bottom: 8px;
    border-radius: 12px; background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    font-size: 13px; font-weight: 600; color: #ef4444;
    text-align: center;
  }
  .missed-alert.show { display: block; animation: slideUp 0.3s ease; }

  /* ── Recenter button ── */
  .recenter-btn {
    position: absolute; bottom: 220px; right: 16px; z-index: 10;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(20,20,20,0.9); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #888; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .recenter-btn:active { background: #222; }
  .recenter-btn.tracking { color: #60a5fa; border-color: rgba(59,130,246,0.3); }

  /* ── GPS status ── */
  .gps-status {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 10;
    padding: 8px 16px; border-radius: 20px;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px; color: #888;
    display: none;
  }
  .gps-status.show { display: block; }

  /* Stop markers */
  .stop-marker {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: all 0.3s;
  }
  .stop-marker.visited { opacity: 0.4; transform: scale(0.8); }
  .stop-marker.next-stop {
    width: 40px; height: 40px; font-size: 15px;
    border-color: #22c55e;
    box-shadow: 0 0 16px rgba(34,197,94,0.4);
    animation: markerPulse 2s ease-in-out infinite;
  }
  @keyframes markerPulse { 0%,100% { box-shadow: 0 0 8px rgba(34,197,94,0.3); } 50% { box-shadow: 0 0 20px rgba(34,197,94,0.6); } }

  /* Driver dot */
  .driver-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #4285f4; border: 3px solid #fff;
    box-shadow: 0 0 12px rgba(66,133,244,0.6);
  }
  .driver-dot-ping {
    position: absolute; top: -10px; left: -10px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(66,133,244,0.2);
    animation: ping 2s ease-out infinite;
  }
  @keyframes ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
</style>
</head>
<body>

<div id="map"></div>

<div class="top-bar">
  <div class="top-pill">
    <div class="dot green" id="gpsDot"></div>
    <span id="routeLabel">Day Route</span>
    <span style="color:#555">|</span>
    <span id="stopLabel">Stop 1/11</span>
  </div>
  <div class="lap-pill" id="lapLabel">Lap 1</div>
</div>

<div class="gps-status" id="gpsStatus">Acquiring GPS signal...</div>

<button class="recenter-btn" id="recenterBtn" onclick="recenter()">◎</button>

<div class="bottom-panel">
  <div class="approach-alert" id="approachAlert"></div>
  <div class="missed-alert" id="missedAlert"></div>
  <div class="next-stop-card">
    <div class="next-label" id="nextLabel">Next Stop</div>
    <div class="next-name" id="nextName">Loading...</div>
    <div class="next-venues" id="nextVenues"></div>
    <div class="next-meta" id="nextMeta"></div>
    <div class="stop-progress" id="stopProgress"></div>
  </div>
  <div class="btn-row">
    <button class="btn-secondary" id="btnPrev" onclick="prevStop()">‹</button>
    <button class="btn-arrived" id="btnArrived" onclick="arrivedAtStop()">Arrived → Next Stop</button>
  </div>
</div>

<script>
mapboxgl.accessToken = '__MAPBOX_TOKEN__';

// ── Supabase ──
const SUPABASE_URL = 'https://mylhldsyxkmzkksgifgt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15bGhsZHN5eGttemtrc2dpZmd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ2NTI4OTIsImV4cCI6MjA3MDIyODg5Mn0.524xtBviD7Y8oQxDSVu9TFWyWz0T4jj0IkMd4N6ANag';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Session ID (anonymous, persisted per device) ──
function getSessionId() {
  let id = localStorage.getItem('driverSessionId');
  if (!id) {
    id = 'drv_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem('driverSessionId', id);
  }
  return id;
}
const SESSION_ID = getSessionId();

async function logStatus() {
  const route = getActiveRoute();
  const stopKey = route[currentIdx];
  const stop = ALL_STOPS[stopKey];
  try {
    await sb.from('sxsw_driver_app_status').upsert({
      session_id: SESSION_ID,
      current_stop_idx: currentIdx,
      current_stop_key: stopKey,
      current_stop_name: stop.name,
      lap_count: lapCount,
      route_type: isNightMode() ? 'night' : 'day',
      last_lat: driverLat,
      last_lng: driverLng,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'session_id' });
  } catch (e) { /* silent */ }
}

// Heartbeat every 30s
setInterval(logStatus, 30000);

// ── Stop Data ──
const ALL_STOPS = {
  'congress':    { name: '3rd & Congress',              lat: 30.26505, lng: -97.74374 },
  'paramount':   { name: 'Paramount / F&TV Clubhouse',  lat: 30.26992, lng: -97.74190 },
  'downright':   { name: 'Downright / Music Clubhouse', lat: 30.27114, lng: -97.73568 },
  'shangrila':   { name: 'Shangri-La',                  lat: 30.26499, lng: -97.73198, nightOnly: true },
  'hotelvegas':  { name: 'Hotel Vegas / Low Down',      lat: 30.26357, lng: -97.72785, nightOnly: true },
  'violetcrown': { name: 'Violet Crown / ACL Live',     lat: 30.26576, lng: -97.74597 },
  'w3rd':        { name: '101 W 3rd St',                lat: 30.26530, lng: -97.74420 },
  'palmer':      { name: 'Palmer Circle Drive',         lat: 30.26017, lng: -97.75345 },
  'zach':        { name: 'Zach Theatre',                lat: 30.26492, lng: -97.75797 },
  'alamo':       { name: 'Alamo Lamar',                 lat: 30.25628, lng: -97.76151 },
  'rollins':     { name: 'Rollins Theater',             lat: 30.25964, lng: -97.75392 },
  'rivian':      { name: 'Rivian',                      lat: 30.25977, lng: -97.74622 },
  'continental': { name: 'Continental Club / SoCo',     lat: 30.25044, lng: -97.74922 },
};

const STOP_VENUES = {
  'congress':    'Convention Center, Hilton Austin',
  'paramount':   'Paramount Theatre, Driskill Hotel',
  'downright':   'Mohawk, Stubb\'s BBQ',
  'shangrila':   'East 6th bars',
  'hotelvegas':  'Volstead Lounge, East Side',
  'violetcrown': 'ACL Live, Moody Theater',
  'w3rd':        '101 W 3rd St',
  'palmer':      'Palmer Events Center',
  'zach':        'Zach Theatre, Lamar Union',
  'alamo':       'Alamo Drafthouse Lamar',
  'rollins':     'Long Center, Rollins Theatre',
  'rivian':      'Rivian Hub',
  'continental': 'Continental Club, SoCo shops',
};

const STOP_COLORS = {
  'congress': '#ef4444', 'paramount': '#f97316', 'downright': '#eab308',
  'shangrila': '#22c55e', 'hotelvegas': '#14b8a6', 'violetcrown': '#06b6d4',
  'w3rd': '#0ea5e9', 'palmer': '#3b82f6', 'zach': '#6366f1',
  'alamo': '#8b5cf6', 'rollins': '#a855f7', 'rivian': '#ec4899',
  'continental': '#f43f5e',
};

const DAY_ROUTE = ['congress','paramount','downright','violetcrown','w3rd','palmer','zach','alamo','rollins','rivian','continental'];
const NIGHT_ROUTE = ['congress','paramount','downright','shangrila','hotelvegas','violetcrown','palmer','zach','alamo','rollins','rivian','continental'];

// ── State ──
let currentIdx = parseInt(localStorage.getItem('driverStopIdx') || '0');
let lapCount = parseInt(localStorage.getItem('driverLapCount') || '1');
let driverLat = null, driverLng = null;
let tracking = true;
let routeLineLoaded = false;
let stopMarkers = [];
let driverMarker = null;

function isNightMode() {
  const h = parseInt(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', hour12: false }));
  return h >= 19;
}
function getActiveRoute() { return isNightMode() ? NIGHT_ROUTE : DAY_ROUTE; }

function save() {
  localStorage.setItem('driverStopIdx', currentIdx);
  localStorage.setItem('driverLapCount', lapCount);
}

// ── Distance calc ──
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000; // meters
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── Map setup ──
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-97.7431, 30.2672],
  zoom: 13.5,
  pitch: 0,
  attributionControl: false,
});

map.on('load', () => {
  loadRouteLine();
  addStopMarkers();
  startGPS();
  updateUI();
  logStatus();
});

// Disable tracking on user drag
map.on('dragstart', () => { tracking = false; updateRecenterBtn(); });

// ── Route line via Mapbox Directions ──
function loadRouteLine() {
  const route = getActiveRoute();
  // Build coordinates string: lng,lat;lng,lat;...;lng,lat (loop back to start)
  const coords = [...route, route[0]].map(key => {
    const s = ALL_STOPS[key];
    return `${s.lng},${s.lat}`;
  }).join(';');

  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (!data.routes || !data.routes[0]) return;

      const geojson = data.routes[0].geometry;

      if (map.getSource('route-line')) {
        map.getSource('route-line').setData({ type: 'Feature', geometry: geojson });
      } else {
        map.addSource('route-line', {
          type: 'geojson',
          data: { type: 'Feature', geometry: geojson }
        });

        // Glow
        map.addLayer({
          id: 'route-glow', type: 'line', source: 'route-line',
          paint: { 'line-color': '#6366f1', 'line-width': 10, 'line-opacity': 0.15, 'line-blur': 8 }
        });
        // Main line
        map.addLayer({
          id: 'route-main', type: 'line', source: 'route-line',
          paint: { 'line-color': '#6366f1', 'line-width': 4, 'line-opacity': 0.7 }
        });
      }
      routeLineLoaded = true;
    })
    .catch(err => console.warn('Route line error:', err));
}

// ── Stop markers ──
function addStopMarkers() {
  // Clear existing
  stopMarkers.forEach(m => m.remove());
  stopMarkers = [];

  const route = getActiveRoute();
  route.forEach((key, i) => {
    const stop = ALL_STOPS[key];
    const color = STOP_COLORS[key] || '#6366f1';

    const el = document.createElement('div');
    el.className = 'stop-marker';
    el.id = `marker-${key}`;
    el.style.background = color;
    el.textContent = i + 1;

    const marker = new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([stop.lng, stop.lat])
      .addTo(map);

    stopMarkers.push(marker);
  });

  updateMarkerStyles();
}

function updateMarkerStyles() {
  const route = getActiveRoute();
  route.forEach((key, i) => {
    const el = document.getElementById(`marker-${key}`);
    if (!el) return;
    el.classList.remove('visited', 'next-stop');
    if (i < currentIdx) el.classList.add('visited');
    else if (i === currentIdx) el.classList.add('next-stop');
  });
}

// ── Driver GPS marker ──
function updateDriverMarker(lat, lng) {
  if (!driverMarker) {
    const el = document.createElement('div');
    el.style.position = 'relative';
    el.innerHTML = '<div class="driver-dot-ping"></div><div class="driver-dot"></div>';
    driverMarker = new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([lng, lat])
      .addTo(map);
  } else {
    driverMarker.setLngLat([lng, lat]);
  }
}

// ── GPS tracking ──
let watchId = null;
function startGPS() {
  const statusEl = document.getElementById('gpsStatus');
  const gpsDot = document.getElementById('gpsDot');

  if (!navigator.geolocation) {
    statusEl.textContent = 'GPS not available on this device';
    statusEl.classList.add('show');
    gpsDot.className = 'dot red';
    return;
  }

  statusEl.textContent = 'Acquiring GPS signal...';
  statusEl.classList.add('show');
  gpsDot.className = 'dot orange';

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      driverLat = pos.coords.latitude;
      driverLng = pos.coords.longitude;

      statusEl.classList.remove('show');
      gpsDot.className = 'dot green';

      updateDriverMarker(driverLat, driverLng);

      if (tracking) {
        map.easeTo({ center: [driverLng, driverLat], duration: 1000 });
      }

      checkProximity();
    },
    (err) => {
      statusEl.textContent = 'GPS error — enable location services';
      statusEl.classList.add('show');
      gpsDot.className = 'dot red';
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

// ── Proximity detection ──
const ARRIVE_RADIUS = 80;  // meters — auto-detect arrival
const APPROACH_RADIUS = 200; // meters — show approaching alert
let isApproaching = false;
let hasArrivedGeo = false;

function checkProximity() {
  if (driverLat === null) return;
  const route = getActiveRoute();
  const stopKey = route[currentIdx];
  const stop = ALL_STOPS[stopKey];
  const dist = haversine(driverLat, driverLng, stop.lat, stop.lng);

  const alertEl = document.getElementById('approachAlert');
  const btn = document.getElementById('btnArrived');
  const missedEl = document.getElementById('missedAlert');

  // Update distance in meta
  updateDistDisplay(dist);

  if (dist <= ARRIVE_RADIUS) {
    // At the stop
    if (!hasArrivedGeo) {
      hasArrivedGeo = true;
      alertEl.textContent = '📍 You\'ve arrived at ' + stop.name + '!';
      alertEl.className = 'approach-alert show arrived';
      btn.classList.add('pulse');
      // Vibrate if available
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  } else if (dist <= APPROACH_RADIUS) {
    if (!isApproaching) {
      isApproaching = true;
      alertEl.textContent = 'Approaching ' + stop.name + ' — ' + Math.round(dist) + 'm away';
      alertEl.className = 'approach-alert show';
    } else {
      alertEl.textContent = 'Approaching ' + stop.name + ' — ' + Math.round(dist) + 'm away';
    }
  } else {
    if (isApproaching && !hasArrivedGeo) {
      // Driver went past without stopping
      missedEl.textContent = '⚠ You may have passed ' + stop.name + ' — please confirm';
      missedEl.className = 'missed-alert show';
    }
    isApproaching = false;
    alertEl.className = 'approach-alert';
    btn.classList.remove('pulse');
  }
}

function updateDistDisplay(dist) {
  const metaEl = document.getElementById('nextMeta');
  let distText;
  if (dist < 1000) distText = Math.round(dist) + ' m away';
  else distText = (dist / 1609.34).toFixed(1) + ' mi away';

  const route = getActiveRoute();
  const stopKey = route[currentIdx];
  metaEl.innerHTML = `<span>Stop <strong>${currentIdx + 1}</strong> of ${route.length}</span><span>${distText}</span>`;
}

// ── Navigation actions ──
function arrivedAtStop() {
  const route = getActiveRoute();
  currentIdx++;
  if (currentIdx >= route.length) {
    currentIdx = 0;
    lapCount++;
  }
  save();
  logStatus();

  // Reset alerts
  isApproaching = false;
  hasArrivedGeo = false;
  document.getElementById('approachAlert').className = 'approach-alert';
  document.getElementById('missedAlert').className = 'missed-alert';
  document.getElementById('btnArrived').classList.remove('pulse');

  updateUI();

  // Pan to next stop
  const nextKey = route[currentIdx] || route[0];
  const nextStop = ALL_STOPS[nextKey];
  if (!tracking && driverLat !== null) {
    // Show both driver and next stop
    const bounds = new mapboxgl.LngLatBounds();
    bounds.extend([driverLng, driverLat]);
    bounds.extend([nextStop.lng, nextStop.lat]);
    map.fitBounds(bounds, { padding: 100, duration: 1000 });
  } else {
    map.easeTo({ center: [nextStop.lng, nextStop.lat], zoom: 15, duration: 1000 });
  }
}

function prevStop() {
  if (currentIdx > 0) {
    currentIdx--;
  } else if (lapCount > 1) {
    currentIdx = getActiveRoute().length - 1;
    lapCount--;
  }
  save();
  isApproaching = false;
  hasArrivedGeo = false;
  document.getElementById('approachAlert').className = 'approach-alert';
  document.getElementById('missedAlert').className = 'missed-alert';
  document.getElementById('btnArrived').classList.remove('pulse');
  updateUI();
}

function recenter() {
  tracking = true;
  updateRecenterBtn();
  if (driverLat !== null) {
    map.easeTo({ center: [driverLng, driverLat], zoom: 15, duration: 500 });
  }
}

function updateRecenterBtn() {
  document.getElementById('recenterBtn').classList.toggle('tracking', tracking);
}

// ── UI update ──
function updateUI() {
  const night = isNightMode();
  const route = getActiveRoute();
  if (currentIdx >= route.length) currentIdx = 0;

  const stopKey = route[currentIdx];
  const stop = ALL_STOPS[stopKey];
  const venues = STOP_VENUES[stopKey] || '';

  // Top bar
  document.getElementById('routeLabel').textContent = night ? '🌙 Night' : '☀️ Day';
  document.getElementById('stopLabel').textContent = `Stop ${currentIdx + 1}/${route.length}`;
  document.getElementById('lapLabel').textContent = `Lap ${lapCount}`;

  // Next stop card
  document.getElementById('nextLabel').textContent = currentIdx === 0 ? 'Starting Stop' : 'Next Stop';
  document.getElementById('nextName').textContent = stop.name;
  document.getElementById('nextVenues').textContent = venues;

  // Distance
  if (driverLat !== null) {
    const dist = haversine(driverLat, driverLng, stop.lat, stop.lng);
    updateDistDisplay(dist);
  } else {
    document.getElementById('nextMeta').innerHTML = `<span>Stop <strong>${currentIdx + 1}</strong> of ${route.length}</span><span>GPS loading...</span>`;
  }

  // Progress pips
  const progEl = document.getElementById('stopProgress');
  progEl.innerHTML = route.map((_, i) => {
    let cls = 'stop-pip';
    if (i < currentIdx) cls += ' done';
    else if (i === currentIdx) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  // Button text
  const btn = document.getElementById('btnArrived');
  if (currentIdx === route.length - 1) {
    btn.textContent = 'Arrived → Complete Lap';
  } else {
    btn.textContent = 'Arrived → Next Stop';
  }

  // Markers
  updateMarkerStyles();
}
</script>
</body>
</html>
