<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #111; color: #fff; overflow: hidden;
    height: 100vh; height: 100dvh;
  }

  #map { width: 100%; height: 100%; }

  /* ── Shuttle picker overlay ── */
  .picker-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.95); backdrop-filter: blur(12px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
  }
  .picker-overlay.hidden { display: none; }
  .picker-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .picker-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  .picker-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    width: 100%; max-width: 340px;
  }
  .picker-btn {
    padding: 18px 10px; border: 2px solid #333; border-radius: 14px;
    background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .picker-btn:active { transform: scale(0.96); }
  .picker-btn:hover { border-color: #555; background: #222; }
  .picker-btn .num { font-size: 24px; display: block; margin-bottom: 4px; }
  .picker-btn .label { font-size: 10px; color: #666; }
  .picker-change {
    position: absolute; top: 12px; right: 16px; z-index: 101;
    padding: 6px 12px; border-radius: 8px; border: 1px solid #333;
    background: rgba(20,20,20,0.9); backdrop-filter: blur(8px);
    color: #888; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .picker-change:active { background: #222; }

  /* ── Top status bar ── */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top));
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }
  .top-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px; font-weight: 600; color: #ccc;
  }
  .top-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .top-pill .dot.green { background: #22c55e; }
  .top-pill .dot.orange { background: #f97316; }
  .top-pill .dot.red { background: #ef4444; }
  .gps-label { font-size: 10px; color: #666; }
  .lap-pill { font-size: 11px; color: #888; padding: 6px 10px; border-radius: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }

  /* ── Bottom panel ── */
  .bottom-panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 0 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 60%, transparent 100%);
    pointer-events: none;
  }
  .bottom-panel > * { pointer-events: auto; }

  .next-stop-card {
    background: rgba(20,20,20,0.95); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 16px; margin-bottom: 12px;
  }
  .next-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .next-name { font-size: 22px; font-weight: 800; color: #fff; margin-top: 4px; line-height: 1.2; }
  .next-venues { font-size: 12px; color: #555; margin-top: 4px; }
  .next-meta {
    display: flex; gap: 16px; margin-top: 10px;
    font-size: 12px; color: #888;
  }
  .next-meta strong { color: #a5b4fc; }

  .stop-progress { display: flex; gap: 4px; margin-top: 12px; }
  .stop-pip {
    flex: 1; height: 4px; border-radius: 2px; background: #333;
    transition: background 0.3s;
  }
  .stop-pip.done { background: #22c55e; }
  .stop-pip.current { background: #6366f1; }

  .btn-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .btn-arrived {
    flex: 1; padding: 16px; border: none; border-radius: 14px;
    background: #22c55e; color: #fff;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-arrived:active { background: #16a34a; transform: scale(0.98); }
  .btn-arrived.pulse { animation: btnPulse 1s ease-in-out infinite; }
  @keyframes btnPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { box-shadow: 0 0 0 12px rgba(34,197,94,0); } }

  .btn-secondary {

    color: #888; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;

  .btn-secondary:active { background: #222; }

  /* ── Alerts ── */
  .approach-alert {
    display: none; padding: 10px 16px; margin-bottom: 8px;
    border-radius: 12px; background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    font-size: 13px; font-weight: 600; color: #a5b4fc; text-align: center;
  }
  .approach-alert.show { display: block; animation: slideUp 0.3s ease; }
  .approach-alert.arrived { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #22c55e; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .missed-alert {
    display: none; padding: 10px 16px; margin-bottom: 8px;
    border-radius: 12px; background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    font-size: 13px; font-weight: 600; color: #ef4444; text-align: center;
  }
  .missed-alert.show { display: block; animation: slideUp 0.3s ease; }

  /* ── Recenter / status ── */
  .recenter-btn {
    position: absolute; bottom: 220px; right: 16px; z-index: 10;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(20,20,20,0.9); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #888; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .recenter-btn:active { background: #222; }
  .recenter-btn.tracking { color: #60a5fa; border-color: rgba(59,130,246,0.3); }

  .gps-status {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 10;
    padding: 8px 16px; border-radius: 20px;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px; color: #888; display: none;
  }
  .gps-status.show { display: block; }

  /* ── Map markers ── */
  .stop-marker {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
    border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer; transition: all 0.3s;
  }
  .stop-marker.visited { opacity: 0.4; transform: scale(0.8); }
  .stop-marker.next-stop {
    width: 40px; height: 40px; font-size: 15px;
    border-color: #22c55e; box-shadow: 0 0 16px rgba(34,197,94,0.4);
    animation: markerPulse 2s ease-in-out infinite;
  }
  @keyframes markerPulse { 0%,100% { box-shadow: 0 0 8px rgba(34,197,94,0.3); } 50% { box-shadow: 0 0 20px rgba(34,197,94,0.6); } }

  .driver-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #4285f4; border: 3px solid #fff;
    box-shadow: 0 0 12px rgba(66,133,244,0.6);
  }
  .driver-dot-ping {
    position: absolute; top: -10px; left: -10px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(66,133,244,0.2);
    animation: ping 2s ease-out infinite;
  }
  @keyframes ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
</style>

// ── Shuttle list ──
const SHUTTLES = [

// ── Stop Data ──
const ALL_STOPS = {

};

const STOP_VENUES = {
  'congress':    'Convention Center, Hilton Austin',
  'paramount':   'Paramount Theatre, Driskill Hotel',
  'downright':   'Mohawk, Stubb\'s BBQ',
  'shangrila':   'East 6th bars',
  'hotelvegas':  'Volstead Lounge, East Side',
  'violetcrown': 'ACL Live, Moody Theater',
  'w3rd':        '101 W 3rd St',
  'palmer':      'Palmer Events Center',
  'zach':        'Zach Theatre, Lamar Union',
  'alamo':       'Alamo Drafthouse Lamar',
  'rollins':     'Long Center, Rollins Theatre',
  'rivian':      'Rivian Hub',
  'continental': 'Continental Club, SoCo shops',
};

const STOP_COLORS = {
  'congress': '#ef4444', 'paramount': '#f97316', 'downright': '#eab308',
  'shangrila': '#22c55e', 'hotelvegas': '#14b8a6', 'violetcrown': '#06b6d4',
  'w3rd': '#0ea5e9', 'palmer': '#3b82f6', 'zach': '#6366f1',
  'alamo': '#8b5cf6', 'rollins': '#a855f7', 'rivian': '#ec4899',
  'continental': '#f43f5e',
};

const DAY_ROUTE = ['congress','paramount','downright','violetcrown','w3rd','palmer','zach','alamo','rollins','rivian','continental'];
const NIGHT_ROUTE = ['congress','paramount','downright','hotelvegas','shangrila','violetcrown','w3rd','palmer','zach','alamo','rollins','rivian','continental'];

// ── State ──
let selectedShuttle = null;
let currentIdx = parseInt(localStorage.getItem('driverStopIdx') || '0');
let lapCount = parseInt(localStorage.getItem('driverLapCount') || '1');
let driverLat = null, driverLng = null;
let tracking = true;
let routeLineLoaded = false;
let stopMarkers = [];
let driverMarker = null;
let pollTimer = null;
let lastGpsTime = null;

function isNightMode() {
  const h = parseInt(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', hour12: false }));
  return h >= 19;
}
function getActiveRoute() { return isNightMode() ? NIGHT_ROUTE : DAY_ROUTE; }

function save() {
  localStorage.setItem('driverStopIdx', currentIdx);
  localStorage.setItem('driverLapCount', lapCount);
}

// ── Supabase logging ──
async function logStatus() {
  if (!selectedShuttle) return;
  const route = getActiveRoute();
  const stopKey = route[currentIdx];
  const stop = ALL_STOPS[stopKey];
  try {
    await sb.from('sxsw_driver_app_status').upsert({
      session_id: 'shuttle_' + selectedShuttle.num,
      current_stop_idx: currentIdx,
      current_stop_key: stopKey,
      current_stop_name: stop.name,
      lap_count: lapCount,
      route_type: isNightMode() ? 'night' : 'day',
      last_lat: driverLat,
      last_lng: driverLng,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'session_id' });
  } catch (e) { /* silent */ }
}

// ── Distance calc ──
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── Shuttle Picker ──
function buildPicker() {
  const grid = document.getElementById('pickerGrid');
  SHUTTLES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'picker-btn';
    const color = SHUTTLE_COLORS[(s.num - 1) % 12];
    btn.style.borderColor = color;
    btn.innerHTML = `<span class="num" style="color:${color}">${s.num}</span><span class="label">${s.ada ? 'ADA' : 'Standard'}</span>`;
    btn.onclick = () => selectShuttle(s);
    grid.appendChild(btn);
  });
}

function selectShuttle(shuttle) {
  selectedShuttle = shuttle;
  localStorage.setItem('driverShuttleNum', shuttle.num);
  document.getElementById('pickerOverlay').classList.add('hidden');
  document.getElementById('changeShuttle').style.display = '';
  document.getElementById('shuttleLabel').textContent = shuttle.name;
  document.getElementById('shuttleLabel').style.color = SHUTTLE_COLORS[(shuttle.num - 1) % 12];
  startVehicleGPS();
  logStatus();
}

function showPicker() {
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('pickerOverlay').classList.remove('hidden');
  document.getElementById('changeShuttle').style.display = 'none';
}

function restoreShuttle() {
  const num = parseInt(localStorage.getItem('driverShuttleNum'));
  if (num) {
    const shuttle = SHUTTLES.find(s => s.num === num);
    if (shuttle) { selectShuttle(shuttle); return; }
  }
  // Show picker
  document.getElementById('pickerOverlay').classList.remove('hidden');
}

// ── Vehicle GPS polling (hardware tracker) ──
function startVehicleGPS() {
  const statusEl = document.getElementById('gpsStatus');
  const gpsDot = document.getElementById('gpsDot');
  const gpsLabel = document.getElementById('gpsLabel');

  statusEl.textContent = 'Connecting to vehicle GPS...';
  statusEl.classList.add('show');
  gpsDot.className = 'dot orange';

  async function pollPosition() {
    try {
      const topic = `${SOLUTION_ID}/+/+/+/+/${selectedShuttle.id}/position`;
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topics: [topic] })
      });
      const data = await res.json();

      if (data.length > 0 && data[0].properties?.coordinates) {
        const coords = data[0].properties.coordinates;
        const ts = data[0].timestamp;
        const age = Date.now() - new Date(ts).getTime();

        driverLat = coords.latitude;
        driverLng = coords.longitude;
        lastGpsTime = ts;

        // Update status
        if (age < 30000) {
          gpsDot.className = 'dot green';
          gpsLabel.textContent = 'Vehicle GPS';
          gpsLabel.style.color = '#22c55e';
          statusEl.classList.remove('show');
        } else if (age < 120000) {
          gpsDot.className = 'dot orange';
          gpsLabel.textContent = Math.round(age / 1000) + 's ago';
          gpsLabel.style.color = '#f97316';
          statusEl.classList.remove('show');
        } else {
          gpsDot.className = 'dot red';
          gpsLabel.textContent = 'Stale';
          gpsLabel.style.color = '#ef4444';
          statusEl.textContent = 'Vehicle GPS signal stale — is the shuttle on?';
          statusEl.classList.add('show');
        }

        updateDriverMarker(driverLat, driverLng);

        if (tracking) {
          map.easeTo({ center: [driverLng, driverLat], duration: 1000 });
        }

        checkProximity();
      } else {
        gpsDot.className = 'dot red';
        gpsLabel.textContent = 'No signal';
        gpsLabel.style.color = '#ef4444';
        statusEl.textContent = 'No GPS data from vehicle — is the shuttle on?';
        statusEl.classList.add('show');
      }
    } catch (err) {
      gpsDot.className = 'dot red';
      gpsLabel.textContent = 'Error';
      statusEl.textContent = 'Connection error — retrying...';
      statusEl.classList.add('show');
    }
  }

  // Poll immediately then every 5s
  pollPosition();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollPosition, POLL_INTERVAL);

  // Log status to Supabase every 30s
  setInterval(logStatus, 30000);
}

// ── Route line via Mapbox Directions ──
function loadRouteLine() {
  const route = getActiveRoute();
  const coords = [...route, route[0]].map(key => {
    const s = ALL_STOPS[key];
    return `${s.lng},${s.lat}`;
  }).join(';');

  fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`)
    .then(r => r.json())
    .then(data => {
      if (!data.routes || !data.routes[0]) return;
      const geojson = data.routes[0].geometry;
      if (map.getSource('route-line')) {
        map.getSource('route-line').setData({ type: 'Feature', geometry: geojson });
      } else {
        map.addSource('route-line', { type: 'geojson', data: { type: 'Feature', geometry: geojson } });
        map.addLayer({ id: 'route-glow', type: 'line', source: 'route-line',
          paint: { 'line-color': '#6366f1', 'line-width': 10, 'line-opacity': 0.15, 'line-blur': 8 } });
        map.addLayer({ id: 'route-main', type: 'line', source: 'route-line',
          paint: { 'line-color': '#6366f1', 'line-width': 4, 'line-opacity': 0.7 } });
      }
      routeLineLoaded = true;
    })
    .catch(err => console.warn('Route line error:', err));
}

// ── Stop markers ──
function addStopMarkers() {
  stopMarkers.forEach(m => m.remove());
  stopMarkers = [];
  const route = getActiveRoute();
  route.forEach((key, i) => {
    const stop = ALL_STOPS[key];
    const color = STOP_COLORS[key] || '#6366f1';
    const el = document.createElement('div');
    el.className = 'stop-marker';
    el.id = `marker-${key}`;
    el.style.background = color;
    el.textContent = i + 1;
    const marker = new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([stop.lng, stop.lat]).addTo(map);
    stopMarkers.push(marker);
  });
  updateMarkerStyles();
}

function updateMarkerStyles() {
  const route = getActiveRoute();
  route.forEach((key, i) => {
    const el = document.getElementById(`marker-${key}`);
    if (!el) return;
    el.classList.remove('visited', 'next-stop');
    if (i < currentIdx) el.classList.add('visited');
    else if (i === currentIdx) el.classList.add('next-stop');
  });
}

// ── Driver marker ──
function updateDriverMarker(lat, lng) {
  if (!driverMarker) {
    const el = document.createElement('div');
    el.style.position = 'relative';
    el.innerHTML = '<div class="driver-dot-ping"></div><div class="driver-dot"></div>';
    driverMarker = new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([lng, lat]).addTo(map);
  } else {
    driverMarker.setLngLat([lng, lat]);
  }
}

// ── Proximity detection ──
const ARRIVE_RADIUS = 80;
const APPROACH_RADIUS = 200;
let isApproaching = false;
let hasArrivedGeo = false;

function checkProximity() {
  if (driverLat === null) return;
  const route = getActiveRoute();
  const stopKey = route[currentIdx];
  const stop = ALL_STOPS[stopKey];
  const dist = haversine(driverLat, driverLng, stop.lat, stop.lng);

  const alertEl = document.getElementById('approachAlert');
  const btn = document.getElementById('btnArrived');
  const missedEl = document.getElementById('missedAlert');

  updateDistDisplay(dist);

  if (dist <= ARRIVE_RADIUS) {
    if (!hasArrivedGeo) {
      hasArrivedGeo = true;
      alertEl.textContent = '📍 You\'ve arrived at ' + stop.name + '!';
      alertEl.className = 'approach-alert show arrived';
      btn.classList.add('pulse');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  } else if (dist <= APPROACH_RADIUS) {
    if (!isApproaching) isApproaching = true;
    alertEl.textContent = 'Approaching ' + stop.name + ' — ' + Math.round(dist) + 'm away';
    alertEl.className = 'approach-alert show';
  } else {
    if (isApproaching && !hasArrivedGeo) {
      missedEl.textContent = '⚠ You may have passed ' + stop.name + ' — please confirm';
      missedEl.className = 'missed-alert show';
    }
    isApproaching = false;
    alertEl.className = 'approach-alert';
    btn.classList.remove('pulse');
  }
}

function updateDistDisplay(dist) {
  const metaEl = document.getElementById('nextMeta');
  let distText;
  if (dist < 1000) distText = Math.round(dist) + ' m away';
  else distText = (dist / 1609.34).toFixed(1) + ' mi away';
  const route = getActiveRoute();
  metaEl.innerHTML = `<span>Stop <strong>${currentIdx + 1}</strong> of ${route.length}</span><span>${distText}</span>`;
}

// ── Navigation actions ──
function arrivedAtStop() {
  const route = getActiveRoute();
  currentIdx++;
  if (currentIdx >= route.length) { currentIdx = 0; lapCount++; }
  save();
  logStatus();

  isApproaching = false;
  hasArrivedGeo = false;
  document.getElementById('approachAlert').className = 'approach-alert';
  document.getElementById('missedAlert').className = 'missed-alert';
  document.getElementById('btnArrived').classList.remove('pulse');

  updateUI();

  const nextKey = route[currentIdx] || route[0];
  const nextStop = ALL_STOPS[nextKey];
  if (!tracking && driverLat !== null) {
    const bounds = new mapboxgl.LngLatBounds();
    bounds.extend([driverLng, driverLat]);
    bounds.extend([nextStop.lng, nextStop.lat]);
    map.fitBounds(bounds, { padding: 100, duration: 1000 });
  } else {
    map.easeTo({ center: [nextStop.lng, nextStop.lat], zoom: 15, duration: 1000 });
  }
}

function prevStop() {
  if (currentIdx > 0) currentIdx--;
  else if (lapCount > 1) { currentIdx = getActiveRoute().length - 1; lapCount--; }
  save();
  isApproaching = false;
  hasArrivedGeo = false;
  document.getElementById('approachAlert').className = 'approach-alert';
  document.getElementById('missedAlert').className = 'missed-alert';
  document.getElementById('btnArrived').classList.remove('pulse');
  updateUI();
}

function recenter() {
  tracking = true;
  updateRecenterBtn();
  if (driverLat !== null) map.easeTo({ center: [driverLng, driverLat], zoom: 15, duration: 500 });
}

function updateRecenterBtn() {
  document.getElementById('recenterBtn').classList.toggle('tracking', tracking);
}

// ── UI update ──
function updateUI() {
  const night = isNightMode();
  const route = getActiveRoute();
  if (currentIdx >= route.length) currentIdx = 0;

  const stopKey = route[currentIdx];
  const stop = ALL_STOPS[stopKey];
  const venues = STOP_VENUES[stopKey] || '';

  document.getElementById('routeLabel').textContent = night ? '🌙 Night' : '☀️ Day';
  document.getElementById('stopLabel').textContent = `Stop ${currentIdx + 1}/${route.length}`;
  document.getElementById('lapLabel').textContent = `Lap ${lapCount}`;

  document.getElementById('nextLabel').textContent = currentIdx === 0 ? 'Starting Stop' : 'Next Stop';
  document.getElementById('nextName').textContent = stop.name;
  document.getElementById('nextVenues').textContent = venues;

  if (driverLat !== null) {
    updateDistDisplay(haversine(driverLat, driverLng, stop.lat, stop.lng));
  } else {
    document.getElementById('nextMeta').innerHTML = `<span>Stop <strong>${currentIdx + 1}</strong> of ${route.length}</span><span>Waiting for GPS...</span>`;
  }

  document.getElementById('stopProgress').innerHTML = route.map((_, i) => {
    let cls = 'stop-pip';
    if (i < currentIdx) cls += ' done';
    else if (i === currentIdx) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  const btn = document.getElementById('btnArrived');
  btn.textContent = currentIdx === route.length - 1 ? 'Arrived → Complete Lap' : 'Arrived → Next Stop';

  updateMarkerStyles();
}
</script>
